name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"

# Single-package repo: @vanduo-oss/vd3 is fully standalone (only peer: vue),
# so CI needs nothing beyond the committed lockfile.

# Least-privilege default token: this workflow only reads the repo.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - run: pnpm install --frozen-lockfile

      # Bootstrap the generated theme-data module (src/theme/generated/
      # tokens.data.ts) that lint/typecheck/test need on a fresh clone.
      - run: pnpm run build:tokens

      - run: pnpm run lint
      - run: pnpm run format:check
      - run: pnpm run stylelint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm run check:classes
