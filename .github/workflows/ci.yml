name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"

# Single-package repo: @vanduo-oss/vd3 is fully standalone (only peer: vue),
# so CI needs nothing beyond the committed lockfile.

# Least-privilege default token: this workflow only reads the repo.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.28.2

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - run: pnpm install --frozen-lockfile

      # Bootstrap the generated theme-data module (src/theme/generated/
      # tokens.data.ts) that lint/typecheck/test need on a fresh clone.
      - run: pnpm run build:tokens

      - run: pnpm run lint
      - run: pnpm run format:check
      - run: pnpm run stylelint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm run check:classes
